<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Eliminazione Nave Crociera</title>
</head>
<body>
    <h1>Eliminazione Nave Crociera</h1>
    <p>Sei sicuro di voler eliminare la nave con IMO {{nave.imo}}?</p>
    <form method="POST" action="/crociera/elimina/{{nave.imo}}">
    {% csrf_token %}
    <button type="submit">Elimina</button>
    </form>
    <a href="/crociera"><button>Annulla</button></a>
</body>
</html>
