<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    {% if success %}
    {{ success }}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <br><br>
        <label for="username">Username: </label>
        <input type="text" name="username" id="username">
        <br><br>
        <label for="password">Password: </label>
        <input type="password" name="password" id="password">
        <br><br>
        <button type="submit">Login</button>
    </form>
<br><br>
    {% if error %}
    {{ error }}
    {% endif %}
</body>
</html>
